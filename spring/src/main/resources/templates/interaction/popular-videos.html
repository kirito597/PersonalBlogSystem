<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>热门视频 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/interaction/popular/articles}">热门文章</a>
            <a class="nav-link" th:href="@{/interaction/popular/videos}">热门视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>热门视频</h2>
        <a th:href="@{/content/videos}" class="btn btn-outline-success">🎬 全部视频</a>
    </div>

    <div class="alert alert-warning">
        <h5>热门排行</h5>
        <p class="mb-0">根据浏览量和点赞数综合计算的热门视频</p>
    </div>

    <div class="row">
        <div th:each="video : ${videos}" class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100">
                <div class="position-relative">
                    <div th:if="${video.coverImage}">
                        <img th:src="@{${video.coverImage}}" class="card-img-top" alt="视频封面" style="height: 200px; object-fit: cover;">
                    </div>
                    <div th:unless="${video.coverImage}" class="card-img-top bg-light d-flex align-items-center justify-content-center"
                         style="height: 200px;">
                        <span class="text-muted">暂无封面</span>
                    </div>
                    <span class="position-absolute top-0 start-0 badge bg-danger m-2 fs-6"
                          th:text="${videoStat.index + 1}">1</span>
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">
                        <a th:href="@{/content/videos/{id}(id=${video.id})}" th:text="${video.title}"></a>
                    </h5>
                    <p class="card-text flex-grow-1 text-muted"
                       th:text="${#strings.abbreviate(video.description, 60)}"></p>
                    <div class="mt-auto">
                        <div class="d-flex justify-content-between text-muted small">
                            <span><span th:text="${video.username}"></span></span>
                            <span><span th:text="${video.viewCount}"></span> | <span th:text="${video.likeCount}"></span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(videos)}" class="alert alert-info text-center">
        <h5>暂无热门视频</h5>
        <p>视频被浏览和点赞后就会出现在这里</p>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>热门文章 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/interaction/popular/articles}">热门文章</a>
            <a class="nav-link" th:href="@{/interaction/popular/videos}">热门视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>热门文章</h2>
        <a th:href="@{/content/articles}" class="btn btn-outline-primary">全部文章</a>
    </div>

    <div class="alert alert-warning">
        <h5>热门排行</h5>
        <p class="mb-0">根据浏览量和点赞数综合计算的热门文章</p>
    </div>

    <div th:each="article : ${articles}" class="card mb-3">
        <div class="card-body">
            <div class="d-flex align-items-start">
                <div class="me-3">
                    <span class="badge bg-danger fs-6" th:text="${articleStat.index + 1}">1</span>
                </div>
                <div class="flex-grow-1">
                    <h5 class="card-title">
                        <a th:href="@{/content/articles/{id}(id=${article.id})}" th:text="${article.title}"></a>
                    </h5>
                    <p class="card-text text-muted" th:text="${#strings.abbreviate(article.content, 100)}"></p>
                    <div class="d-flex justify-content-between text-muted">
                        <small>作者: <span th:text="${article.username}"></span></small>
                        <small><span th:text="${#temporals.format(article.createdTime, 'yyyy-MM-dd')}"></span></small>
                        <small><span th:text="${article.viewCount}"></span> | <span th:text="${article.likeCount}"></span></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(articles)}" class="alert alert-info text-center">
        <h5>暂无热门文章</h5>
        <p>文章被浏览和点赞后就会出现在这里</p>
    </div>
</div>
</body>
</html>

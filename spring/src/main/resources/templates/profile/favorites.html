<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的收藏 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">👤 个人中心</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/profile/dashboard}" class="list-group-item list-group-item-action">个人主页</a>
                    <a th:href="@{/profile/info}" class="list-group-item list-group-item-action">个人信息</a>
                    <a th:href="@{/content/my-articles}" class="list-group-item list-group-item-action">我的文章</a>
                    <a th:href="@{/content/my-videos}" class="list-group-item list-group-item-action">我的视频</a>
                    <a th:href="@{/profile/favorites}" class="list-group-item list-group-item-action active">我的收藏</a>
                    <a th:href="@{/profile/notifications}" class="list-group-item list-group-item-action">消息通知</a>
                    <a th:href="@{/profile/settings}" class="list-group-item list-group-item-action">设置</a>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">我的收藏</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <h5>收藏功能</h5>
                        <p class="mb-0">收藏功能正在开发中，即将上线！</p>
                    </div>

                    <div class="text-center py-5">
                        <div class="mb-3">
                            <span style="font-size: 4rem;"></span>
                        </div>
                        <h5>收藏功能即将到来</h5>
                        <p class="text-muted">我们正在努力开发收藏功能，让您可以轻松收藏喜欢的内容。</p>
                        <a th:href="@{/content/articles}" class="btn btn-primary">去浏览内容</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>文章列表 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/content/articles/publish}">发布文章</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2>文章列表</h2>
            <div class="mb-3">
                <a th:href="@{/content/articles/publish}" class="btn btn-primary">发布新文章</a>
                <a th:href="@{/content/my-articles}" class="btn btn-outline-secondary ms-2">我的文章</a>
            </div>

            <div th:each="article : ${articles}" class="card mb-3">
                <div class="card-body">
                    <h5 class="card-title">
                        <a th:href="@{/content/articles/{id}(id=${article.id})}" th:text="${article.title}"></a>
                    </h5>
                    <p class="card-text" th:text="${#strings.abbreviate(article.content, 100)}"></p>
                    <div class="d-flex justify-content-between text-muted">
                        <small>作者: <span th:text="${article.username}"></span></small>
                        <small>发布时间: <span th:text="${#temporals.format(article.createdTime, 'yyyy-MM-dd HH:mm')}"></span></small>
                        <small>浏览: <span th:text="${article.viewCount}"></span> | 点赞: <span th:text="${article.likeCount}"></span></small>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(articles)}" class="alert alert-info">
                暂无文章，<a th:href="@{/content/articles/publish}">发布第一篇</a>吧！
            </div>
        </div>
    </div>
</div>
</body>
</html>

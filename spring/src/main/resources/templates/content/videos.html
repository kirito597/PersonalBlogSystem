<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>视频列表 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/content/videos/publish}">发布视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>视频列表</h2>
        <div>
            <a th:href="@{/content/videos/publish}" class="btn btn-success">发布新视频</a>
            <a th:href="@{/content/my-videos}" class="btn btn-outline-secondary ms-2">我的视频</a>
        </div>
    </div>

    <div class="row">
        <div th:each="video : ${videos}" class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100">
                <div th:if="${video.coverImage}">
                    <img th:src="@{${video.coverImage}}" class="card-img-top" alt="视频封面" style="height: 200px; object-fit: cover;">
                </div>
                <div th:unless="${video.coverImage}" class="card-img-top bg-light d-flex align-items-center justify-content-center"
                     style="height: 200px;">
                    <span class="text-muted">暂无封面</span>
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">
                        <a th:href="@{/content/videos/{id}(id=${video.id})}" th:text="${video.title}"></a>
                    </h5>
                    <p class="card-text flex-grow-1 text-muted"
                       th:text="${#strings.abbreviate(video.description, 80)}"></p>
                    <div class="mt-auto">
                        <div class="d-flex justify-content-between text-muted small">
                            <span><span th:text="${video.username}"></span></span>
                            <span><span th:text="${#temporals.format(video.createdTime, 'MM-dd HH:mm')}"></span></span>
                        </div>
                        <div class="d-flex justify-content-between text-muted small mt-1">
                            <span><span th:text="${video.viewCount}"></span></span>
                            <span><span th:text="${video.likeCount}"></span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(videos)}" class="alert alert-info text-center">
        <h5>暂无视频</h5>
        <p>快来<a th:href="@{/content/videos/publish}" class="alert-link">发布第一个视频</a>吧！</p>
    </div>
</div>
</body>
</html>

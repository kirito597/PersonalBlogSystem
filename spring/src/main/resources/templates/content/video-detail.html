<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${video.title} + ' - 内容分享平台'">视频详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .article-content {
            line-height: 1.7;
            font-size: 1.05em;
        }
        .article-meta {
            font-size: 0.9em;
            color: #6c757d;
        }
        .comment-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #dee2e6;
        }
        .comment-item {
            padding: 1rem 0;
            border-bottom: 1px solid #f8f9fa;
        }
        .comment-meta {
            font-size: 0.85em;
            color: #6c757d;
        }
        .comment-content {
            margin: 0.5rem 0;
            line-height: 1.5;
        }
        .comment-form {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1.5rem;
        }
        .no-comments {
            text-align: center;
            color: #6c757d;
            padding: 2rem;
        }
        .comment-actions {
            font-size: 0.85em;
        }
        .reply-form {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 0.375rem;
            margin-top: 10px;
            display: none;
        }
        .reply-item {
            margin-left: 40px;
            padding: 0.75rem 0;
            border-bottom: 1px dashed #e9ecef;
        }
        .reply-item .reply-item {
            margin-left: 30px;
        }
        .show-replies-btn {
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 0.8em;
            padding: 2px 6px;
        }
        .show-replies-btn:hover {
            color: #007bff;
            text-decoration: underline;
        }
        .reply-indicator {
            color: #6c757d;
            font-size: 0.8em;
            margin-left: 5px;
        }
        .video-player {
            border-radius: 0.375rem;
            overflow: hidden;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-2" th:text="${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <article>
                <header class="mb-4">
                    <h3 class="fw-bold" th:text="${video.title}">视频标题</h3>
                    <div class="article-meta mb-3">
                        <span>作者：<strong th:text="${video.username}">作者名</strong></span>
                        <span class="ms-3">发布时间：<span th:text="${#temporals.format(video.createdTime, 'yyyy-MM-dd HH:mm')}">2023-01-01 12:00</span></span>
                        <span class="ms-3">浏览：<span th:text="${video.viewCount}">0</span></span>
                        <span class="ms-3">点赞：<span th:text="${video.likeCount}">0</span></span>
                    </div>
                </header>

                <div class="mb-4">
                    <div class="video-player">
                        <div class="ratio ratio-16x9">
                            <video controls class="rounded" th:if="${video.videoUrl}">
                                <source th:src="${video.videoUrl}" type="video/mp4">
                                您的浏览器不支持视频播放。
                            </video>
                        </div>
                    </div>
                </div>

                <div class="mb-4" th:if="${video.description}">
                    <div class="card">
                        <div class="card-body">
                            <h6 class="card-title">视频描述</h6>
                            <p class="card-text" th:text="${video.description}" style="white-space: pre-line;">视频描述内容</p>
                        </div>
                    </div>
                </div>

                <footer class="pt-3 border-top">
                    <div class="d-flex justify-content-between align-items-center">
                        <a th:href="@{/content/videos}" class="btn btn-outline-secondary btn-sm">返回列表</a>
                        <div>
                            <button class="btn btn-outline-danger btn-sm me-2" th:data-video-id="${video.id}" onclick="likeVideo(this)">
                                点赞
                            </button>
                            <button class="btn btn-outline-primary btn-sm me-2" onclick="toggleCommentForm()">评论</button>
                            <button class="btn btn-outline-secondary btn-sm">分享</button>
                        </div>
                    </div>
                </footer>
            </article>

            <!-- 评论区域 -->
            <div class="comment-section">
                <h5 class="mb-3">评论</h5>

                <!-- 评论表单 -->
                <div class="comment-form" id="commentForm">
                    <form id="commentSubmitForm">
                        <div class="mb-3">
                            <textarea class="form-control" id="commentContent" rows="3" placeholder="写下你的评论..." required></textarea>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary btn-sm">发表评论</button>
                        </div>
                    </form>
                </div>

                <!-- 评论列表 -->
                <div id="commentsList">
                    <div class="text-center text-muted py-4" id="loadingComments">
                        加载评论中...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 关键修复：使用隐藏字段存储视频ID -->
<input type="hidden" id="videoId" th:value="${video.id}">

<script>
    // 关键修复：从隐藏字段获取视频ID
    function getVideoId() {
        return document.getElementById('videoId').value;
    }

    // 点赞视频
    function likeVideo(button) {
        const videoId = button.getAttribute('data-video-id');
        console.log("点赞视频ID:", videoId);
        fetch('/interaction/like/video/' + videoId, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('点赞成功！');
                    location.reload();
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('操作失败，请重试');
            });
    }

    // 显示/隐藏评论表单
    function toggleCommentForm() {
        const form = document.getElementById('commentForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        if (form.style.display === 'block') {
            document.getElementById('commentContent').focus();
        }
    }

    // 显示/隐藏回复表单
    function showReplyForm(commentId, username, level = 0) {
        // 隐藏其他回复表单
        document.querySelectorAll('.reply-form').forEach(form => {
            form.style.display = 'none';
        });

        // 显示当前回复表单
        const replyForm = document.getElementById(`replyForm_${commentId}`);
        if (replyForm) {
            replyForm.style.display = 'block';
            const textarea = replyForm.querySelector('textarea');
            textarea.focus();
            textarea.placeholder = `回复 @${username}：`;
            // 存储层级信息
            replyForm.dataset.level = level;
        }
    }

    // 提交回复
    function submitReply(commentId) {
        const replyForm = document.getElementById(`replyForm_${commentId}`);
        const content = replyForm.querySelector('textarea').value.trim();
        const level = parseInt(replyForm.dataset.level) || 0;

        if (!content) {
            alert('请输入回复内容');
            return;
        }

        fetch(`/interaction/reply/comment/${commentId}`, {
            method: 'POST',
            body: new URLSearchParams({ content: content })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('回复成功！');
                    replyForm.querySelector('textarea').value = '';
                    replyForm.style.display = 'none';
                    loadComments(); // 重新加载评论列表
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('回复失败，请重试');
            });
    }

    // 取消回复
    function cancelReply(commentId) {
        const replyForm = document.getElementById(`replyForm_${commentId}`);
        replyForm.style.display = 'none';
        replyForm.querySelector('textarea').value = '';
    }

    // 删除评论
    function deleteComment(commentId) {
        if (!confirm('确定要删除这条评论吗？')) {
            return;
        }

        fetch(`/interaction/comment/delete/${commentId}`, {
            method: 'POST'
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('删除成功！');
                    loadComments(); // 重新加载评论列表
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('删除失败，请重试');
            });
    }

    // 递归渲染评论和回复
    function renderComment(comment, level = 0) {
        const marginLeft = level * 40;
        const isReply = level > 0;

        return `
            <div class="${isReply ? 'reply-item' : 'comment-item'}" id="comment_${comment.id}" style="${isReply ? `margin-left: ${marginLeft}px` : ''}">
                <div class="comment-meta">
                    <strong>${comment.username}</strong>
                    ${comment.parentUsername ? `<span class="reply-indicator">回复 @${comment.parentUsername}</span>` : ''}
                    <span class="ms-2">${new Date(comment.createdTime).toLocaleString('zh-CN')}</span>
                </div>
                <div class="comment-content">${comment.content}</div>
                <div class="comment-actions mt-2">
                    <button class="btn btn-outline-primary btn-sm me-2"
                            onclick="showReplyForm(${comment.id}, '${comment.username}', ${level})">
                        回复
                    </button>
                    <button class="btn btn-outline-danger btn-sm"
                            onclick="deleteComment(${comment.id})">
                        删除
                    </button>
                    ${comment.replyCount > 0 ? `
                        <span class="text-muted ms-2">${comment.replyCount}条回复</span>
                    ` : ''}
                </div>

                <!-- 回复表单 -->
                <div class="reply-form" id="replyForm_${comment.id}">
                    <div class="input-group">
                        <textarea class="form-control" rows="2" placeholder="写下你的回复..."></textarea>
                        <div class="input-group-append mt-2">
                            <button class="btn btn-primary btn-sm me-2"
                                    onclick="submitReply(${comment.id})">发送</button>
                            <button class="btn btn-secondary btn-sm"
                                    onclick="cancelReply(${comment.id})">取消</button>
                        </div>
                    </div>
                </div>

                <!-- 递归渲染子回复 -->
                ${comment.replies && comment.replies.length > 0 ?
            comment.replies.map(reply => renderComment(reply, level + 1)).join('') : ''}
            </div>
        `;
    }

    // 加载评论 - 关键修复！
    function loadComments() {
        const videoId = getVideoId();
        console.log("加载评论，视频ID:", videoId);

        fetch('/interaction/comments/video/' + videoId)
            .then(response => response.json())
            .then(data => {
                console.log("收到评论数据:", data);
                const commentsList = document.getElementById('commentsList');
                const loading = document.getElementById('loadingComments');

                if (data.success && data.comments.length > 0) {
                    loading.style.display = 'none';
                    commentsList.innerHTML = data.comments.map(comment => renderComment(comment)).join('');
                } else {
                    loading.innerHTML = '<div class="no-comments">暂无评论，快来发表第一条评论吧！</div>';
                }
            })
            .catch(error => {
                console.error('加载评论失败:', error);
                document.getElementById('loadingComments').innerHTML = '<div class="no-comments">加载评论失败</div>';
            });
    }

    // 提交评论 - 关键修复！
    document.getElementById('commentSubmitForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const videoId = getVideoId();
        const content = document.getElementById('commentContent').value.trim();

        console.log("提交评论，视频ID:", videoId, "内容:", content);

        if (!content) {
            alert('请输入评论内容');
            return;
        }

        const formData = new URLSearchParams();
        formData.append('content', content);

        fetch('/interaction/comment/video/' + videoId, {
            method: 'POST',
            body: formData
        })
            .then(response => response.json())
            .then(data => {
                console.log("提交评论响应:", data);
                if (data.success) {
                    alert('评论成功！');
                    document.getElementById('commentContent').value = '';
                    loadComments(); // 重新加载评论列表
                } else {
                    alert(data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('评论失败，请重试');
            });
    });

    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        console.log("页面加载完成，开始加载评论");
        loadComments();

        // 默认隐藏评论表单
        document.getElementById('commentForm').style.display = 'none';
    });
</script>
</body>
</html>

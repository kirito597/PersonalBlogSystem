<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>发布文章 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/content/articles/publish}">发布文章</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>发布文章</h2>
                <a th:href="@{/content/articles}" class="btn btn-outline-secondary">← 返回</a>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/content/articles/publish}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="title" class="form-label">文章标题</label>
                    <input type="text" class="form-control" id="title" name="title" required
                           placeholder="请输入文章标题">
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">文章内容</label>
                    <textarea class="form-control" id="content" name="content" rows="12" required
                              placeholder="请输入文章内容..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="coverImage" class="form-label">封面图片（可选）</label>
                    <input type="file" class="form-control" id="coverImage" name="coverImage" accept="image/*">
                    <div class="form-text">支持 JPG、PNG 格式，大小不超过 10MB</div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="submit" class="btn btn-primary btn-lg">发布文章</button>
                    <a th:href="@{/content/articles}" class="btn btn-secondary btn-lg ms-2">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的文章 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/content/articles/publish}">发布文章</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>我的文章</h2>
        <div>
            <a th:href="@{/content/articles/publish}" class="btn btn-primary">发布新文章</a>
            <a th:href="@{/content/articles}" class="btn btn-outline-secondary ms-2">全部文章</a>
        </div>
    </div>

    <div th:each="article : ${articles}" class="card mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                    <h5 class="card-title">
                        <a th:href="@{/content/articles/{id}(id=${article.id})}" th:text="${article.title}"></a>
                    </h5>
                    <p class="card-text text-muted" th:text="${#strings.abbreviate(article.content, 120)}"></p>
                    <div class="d-flex justify-content-between text-muted small">
                        <span>发布时间: <span th:text="${#temporals.format(article.createdTime, 'yyyy-MM-dd HH:mm')}"></span></span>
                        <span>浏览: <span th:text="${article.viewCount}"></span> |点赞: <span th:text="${article.likeCount}"></span></span>
                    </div>
                </div>
                <div class="ms-3">
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteArticle([[${article.id}]])">删除</button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(articles)}" class="alert alert-info text-center">
        <h5>您还没有发布过文章</h5>
        <p>快来<a th:href="@{/content/articles/publish}" class="alert-link">发布第一篇</a>吧！</p>
    </div>
</div>

<script>
    function deleteArticle(articleId) {
        if (confirm('确定要删除这篇文章吗？此操作不可恢复。')) {
            window.location.href = '/content/articles/delete/' + articleId;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .time-display {
            font-family: 'Courier New', monospace;
            color: #6c757d;
            font-size: 0.95em;
        }

        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .nav-link {
            padding: 0.5rem 1rem;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            <h4 th:text="${welcomeMessage}">欢迎回来！</h4>
            <p class="time-display mb-4" id="currentTime">加载中...</p>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h6 class="card-title">发布文章</h6>
                            <p class="card-text text-muted small">分享知识和见解</p>
                            <a th:href="@{/content/articles/publish}" class="btn btn-primary btn-sm">写文章</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card h-100">
                        <div class="card-body">
                            <h6 class="card-title">发布视频</h6>
                            <p class="card-text text-muted small">展示创意和才华</p>
                            <a th:href="@{/content/videos/publish}" class="btn btn-success btn-sm">上传视频</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-light">
                    <small class="text-muted">快捷操作</small>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/content/my-articles}" class="list-group-item list-group-item-action py-2">我的文章</a>
                    <a th:href="@{/content/my-videos}" class="list-group-item list-group-item-action py-2">我的视频</a>
                    <a th:href="@{/interaction/popular/articles}" class="list-group-item list-group-item-action py-2">热门文章</a>
                    <a th:href="@{/interaction/popular/videos}" class="list-group-item list-group-item-action py-2">热门视频</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const timeString = now.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        }).replace(/\//g, '-');

        document.getElementById('currentTime').textContent = timeString;
        setTimeout(updateTime, 1000);
    }

    document.addEventListener('DOMContentLoaded', updateTime);
</script>
</body>
</html>

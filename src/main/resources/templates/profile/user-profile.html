<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${targetUser.username} + '的主页 - 内容分享平台'">用户主页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${currentUser.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- 主内容区 -->
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <!-- 用户信息概览 -->
                    <div class="row mb-4">
                        <div class="col-md-8">
                            <h3 th:text="'' + ${targetUser.username} + ' 的主页'"></h3>
                            <p class="text-muted" th:text="'邮箱: ' + ${targetUser.email}"></p>
                            <p class="text-muted" th:text="'注册时间: ' + ${#temporals.format(targetUser.createdTime, 'yyyy-MM-dd HH:mm')}"></p>
                        </div>
                        <div class="col-md-4 text-end">
                            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                                 style="width: 80px; height: 80px; font-size: 2rem;">
                                <span th:text="${targetUser.username.substring(0, 1).toUpperCase()}">U</span>
                            </div>
                        </div>
                    </div>

                    <!-- 数据统计 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card text-center bg-light">
                                <div class="card-body">
                                    <h3 class="text-primary" th:text="${articleCount}">0</h3>
                                    <p class="mb-0">文章数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center bg-light">
                                <div class="card-body">
                                    <h3 class="text-success" th:text="${videoCount}">0</h3>
                                    <p class="mb-0">视频数</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 用户文章 -->
                    <div class="mb-4">
                        <h5>发布的文章</h5>
                        <div th:each="article : ${userArticles}" class="card mb-2">
                            <div class="card-body">
                                <h6 class="card-title">
                                    <a th:href="@{/content/articles/{id}(id=${article.id})}" th:text="${article.title}"></a>
                                </h6>
                                <p class="card-text text-muted small" th:text="${#strings.abbreviate(article.content, 80)}"></p>
                                <div class="d-flex justify-content-between text-muted small">
                                    <span><span th:text="${#temporals.format(article.createdTime, 'yyyy-MM-dd HH:mm')}"></span></span>
                                    <span><span th:text="${article.viewCount}"></span> | <span th:text="${article.likeCount}"></span></span>
                                </div>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(userArticles)}" class="alert alert-info">
                            该用户还没有发布过文章
                        </div>
                    </div>

                    <!-- 用户视频 -->
                    <div class="mb-4">
                        <h5>发布的视频</h5>
                        <div th:each="video : ${userVideos}" class="card mb-2">
                            <div class="card-body">
                                <h6 class="card-title">
                                    <a th:href="@{/content/videos/{id}(id=${video.id})}" th:text="${video.title}"></a>
                                </h6>
                                <p class="card-text text-muted small" th:text="${#strings.abbreviate(video.description, 80)}"></p>
                                <div class="d-flex justify-content-between text-muted small">
                                    <span><span th:text="${#temporals.format(video.createdTime, 'yyyy-MM-dd HH:mm')}"></span></span>
                                    <span><span th:text="${video.viewCount}"></span> | <span th:text="${video.likeCount}"></span></span>
                                </div>
                            </div>
                        </div>
                        <div th:if="${#lists.isEmpty(userVideos)}" class="alert alert-info">
                            该用户还没有发布过视频
                        </div>
                    </div>

                    <div class="text-center">
                        <a th:href="@{/content/articles}" class="btn btn-outline-primary">返回浏览内容</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

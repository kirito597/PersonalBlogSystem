<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人主页 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">个人中心</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/profile/dashboard}" class="list-group-item list-group-item-action active">个人主页</a>
                    <a th:href="@{/profile/info}" class="list-group-item list-group-item-action">个人信息</a>
                    <a th:href="@{/content/my-articles}" class="list-group-item list-group-item-action">我的文章</a>
                    <a th:href="@{/content/my-videos}" class="list-group-item list-group-item-action">我的视频</a>
                    <a th:href="@{/profile/favorites}" class="list-group-item list-group-item-action">我的收藏</a>
                    <a th:href="@{/profile/notifications}" class="list-group-item list-group-item-action">消息通知</a>
                    <a th:href="@{/profile/settings}" class="list-group-item list-group-item-action">设置</a>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">个人主页</h4>
                </div>
                <div class="card-body">
                    <!-- 用户信息概览 -->
                    <div class="row mb-4">
                        <div class="col-md-8">
                            <h5 th:text="'你好，' + ${user.username} + '！'"></h5>
                            <p class="text-muted" th:text="'邮箱: ' + ${user.email}"></p>
                            <p class="text-muted" th:text="'注册时间: ' + ${#temporals.format(user.createdTime, 'yyyy-MM-dd HH:mm')}"></p>
                        </div>
                    </div>

                    <!-- 数据统计 -->
                    <div class="row mb-4">
                        <div class="col-md-3">
                            <div class="card text-center bg-light">
                                <div class="card-body">
                                    <h3 class="text-primary" th:text="${articleCount}">0</h3>
                                    <p class="mb-0">文章数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center bg-light">
                                <div class="card-body">
                                    <h3 class="text-success" th:text="${videoCount}">0</h3>
                                    <p class="mb-0">视频数</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center bg-light">
                                <div class="card-body">
                                    <h3 class="text-warning" th:text="${totalViews}">0</h3>
                                    <p class="mb-0">总浏览</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card text-center bg-light">
                                <div class="card-body">
                                    <h3 class="text-danger" th:text="${totalLikes}">0</h3>
                                    <p class="mb-0">总点赞</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 快捷操作 -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="card h-100">
                                <div class="card-body text-center">
                                    <h5 class="card-title">发布内容</h5>
                                    <p class="card-text">分享你的知识和创意</p>
                                    <a th:href="@{/content/articles/publish}" class="btn btn-outline-primary btn-sm me-1">发布文章</a>
                                    <a th:href="@{/content/videos/publish}" class="btn btn-outline-success btn-sm">发布视频</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="card h-100">
                                <div class="card-body text-center">
                                    <h5 class="card-title">管理内容</h5>
                                    <p class="card-text">查看和管理你发布的内容</p>
                                    <a th:href="@{/content/my-articles}" class="btn btn-outline-info btn-sm me-1">我的文章</a>
                                    <a th:href="@{/content/my-videos}" class="btn btn-outline-info btn-sm">我的视频</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>个人信息 - 内容分享平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">内容分享平台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/content/articles}">文章</a>
            <a class="nav-link" th:href="@{/content/videos}">视频</a>
            <a class="nav-link" th:href="@{/profile/dashboard}">个人中心</a>
            <span class="navbar-text me-3" th:text="'欢迎，' + ${user.username}"></span>
            <a class="nav-link" th:href="@{/logout}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">个人中心</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/profile/dashboard}" class="list-group-item list-group-item-action">个人主页</a>
                    <a th:href="@{/profile/info}" class="list-group-item list-group-item-action active">个人信息</a>
                    <a th:href="@{/content/my-articles}" class="list-group-item list-group-item-action">我的文章</a>
                    <a th:href="@{/content/my-videos}" class="list-group-item list-group-item-action">我的视频</a>
                    <a th:href="@{/profile/favorites}" class="list-group-item list-group-item-action">我的收藏</a>
                    <a th:href="@{/profile/notifications}" class="list-group-item list-group-item-action">消息通知</a>
                    <a th:href="@{/profile/settings}" class="list-group-item list-group-item-action">设置</a>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">个人信息</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-8">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">用户名</label>
                                    <input type="text" class="form-control" th:value="${user.username}" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">邮箱地址</label>
                                    <input type="email" class="form-control" th:value="${user.email}" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">注册时间</label>
                                    <input type="text" class="form-control"
                                           th:value="${#temporals.format(user.createdTime, 'yyyy-MM-dd HH:mm:ss')}" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">用户ID</label>
                                    <input type="text" class="form-control" th:value="${user.id}" readonly>
                                </div>
                            </form>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-body text-center">
                                    <div class="mb-3">
                                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                                             style="width: 80px; height: 80px; font-size: 2rem;">
                                            <span th:text="${user.username.substring(0, 1).toUpperCase()}">U</span>
                                        </div>
                                    </div>
                                    <h5 th:text="${user.username}"></h5>
                                    <p class="text-muted">平台用户</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

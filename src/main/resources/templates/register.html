<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-image: url('/images/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            z-index: 2;
            position: relative;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.8);
        }

        .form-input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #4a90e2, #63b3ed);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
        }

        .btn:hover {
            background: linear-gradient(to right, #3a7bc8, #4a90e2);
            box-shadow: 0 6px 15px rgba(74, 144, 226, 0.4);
            transform: translateY(-2px);
        }

        .links {
            text-align: center;
            margin-top: 25px;
        }

        .links p {
            margin-bottom: 10px;
            color: #666;
        }

        .links a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #3a7bc8;
            text-decoration: underline;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-error {
            background-color: rgba(254, 215, 215, 0.9);
            color: #c53030;
            border-left: 4px solid #e53e3e;
        }

        @media (max-width: 768px) {
            .card {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>用户注册</h1>
            <p>创建您的新账户</p>
        </div>

        <form th:action="@{/register}" method="post">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="form-group">
                <label for="username" class="form-label">用户名</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-input"
                       placeholder="请输入用户名"
                       required
                       th:value="${param.username}">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">邮箱地址</label>
                <input type="email"
                       id="email"
                       name="email"
                       class="form-input"
                       placeholder="请输入邮箱地址"
                       required
                       th:value="${param.email}">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">密码</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-input"
                       placeholder="请输入密码"
                       required>
            </div>

            <button type="submit" class="btn">注册</button>

            <div class="links">
                <p>已有账户？ <a th:href="@{/login}">立即登录</a></p>
                <p><a th:href="@{/}">返回首页</a></p>
            </div>
        </form>
    </div>
</div>
</body>
</html>
